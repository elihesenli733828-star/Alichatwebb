<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AliChat - Modern Voice</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #eef2f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #chat-container {
            width: 100%;
            max-width: 440px;
            height: 85vh;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #header {
            background: #ffffff;
            color: #1e293b;
            padding: 18px 20px;
            font-size: 1.2rem;
            font-weight: 600;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #header .status-dot { width: 9px; height: 9px; background: #10b981; border-radius: 50%; }
        #messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background-color: #fafafa;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message-row { display: flex; align-items: flex-end; gap: 10px; max-width: 80%; }
        .my-row { align-self: flex-end; flex-direction: row-reverse; }
        .other-row { align-self: flex-start; }
        
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: 600;
            font-size: 0.85rem;
            background-color: #64748b;
        }
        .message-content { display: flex; flex-direction: column; }
        .my-row .message-content { align-items: flex-end; }
        .sender-name { font-size: 0.75rem; color: #64748b; margin-bottom: 3px; font-weight: 500; padding: 0 4px; }
        .message-text { padding: 10px 14px; font-size: 0.95rem; line-height: 1.4; word-break: break-word; }
        
        .my-row .message-text { background: #0284c7; color: white; border-radius: 16px 16px 4px 16px; }
        .other-row .message-text { background: #f1f5f9; color: #334155; border-radius: 16px 16px 16px 4px; }
        
        /* Ses mesajı için ses oynatıcı stili */
        audio { max-width: 100%; margin-top: 4px; border-radius: 8px; }

        #input-area {
            display: flex;
            padding: 15px;
            background: #ffffff;
            border-top: 1px solid #f1f5f9;
            gap: 8px;
            align-items: center;
        }
        #message-input {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            border-radius: 24px;
            outline: none;
            font-size: 0.95rem;
        }
        #send-btn {
            background: #0284c7; color: white; border: none; padding: 12px 18px; border-radius: 24px; cursor: pointer; font-weight: 600; font-size: 0.95rem;
        }
        
        /* 🎤 Ses Kayıt Butonu Stili */
        #voice-btn {
            background: #e2e8f0; color: #334155; border: none; padding: 12px 14px; border-radius: 24px; cursor: pointer; font-weight: 600; font-size: 0.95rem; transition: all 0.2s;
        }
        #voice-btn.recording { background: #ef4444; color: white; animation: pulse 1.5s infinite; }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="header">
        <span class="status-dot"></span>
        AliChat
    </div>
    <div id="messages"></div>
    <div id="input-area">
        <button id="voice-btn">🎤</button>
        <input type="text" id="message-input" placeholder="Bir mesaj yazın..." autocomplete="off">
        <button id="send-btn">Gönder</button>
    </div>
</div>

<script>
    let nickname = "";
    while (!nickname.trim()) {
        nickname = prompt("AliChat için kullanıcı adı girin:");
    }

    const socket = io();
    const messagesDiv = document.getElementById('messages');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const voiceBtn = document.getElementById('voice-btn');

    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;

    const colors = ['#0f172a', '#2563eb', '#16a34a', '#db2777', '#ea580c', '#7c3aed', '#0891b2'];
    function getAvatarColor(name) {
        let hash = 0;
        for (let i = 0; i < name.length; i++) { hash = name.charCodeAt(i) + ((hash << 5) - hash); }
        return colors[Math.abs(hash) % colors.length];
    }

    // Ortak mesaj satırı oluşturma fonksiyonu
    function createMessageRow(sender) {
        const row = document.createElement('div');
        row.classList.add('message-row');
        if (sender === nickname.trim()) { row.classList.add('my-row'); } else { row.classList.add('other-row'); }

        const avatar = document.createElement('div');
        avatar.classList.add('avatar');
        avatar.textContent = sender.charAt(0).toUpperCase();
        avatar.style.backgroundColor = getAvatarColor(sender);

        const content = document.createElement('div');
        content.classList.add('message-content');

        const nameDiv = document.createElement('div');
        nameDiv.classList.add('sender-name');
        nameDiv.textContent = sender;

        content.appendChild(nameDiv);
        row.appendChild(avatar);
        row.appendChild(content);
        messagesDiv.appendChild(row);
        
        return content; // İçeriği ekleyeceğimiz alanı döndürüyor
    }

    // Normal Yazılı Mesaj Alındığında
    socket.on('message', function(data) {
        const separatorIndex = data.indexOf(':');
        let sender = "Sistem";
        let text = data;

        if (separatorIndex !== -1) {
            sender = data.substring(0, separatorIndex).trim();
            text = data.substring(separatorIndex + 1).trim();
        }

        const contentArea = createMessageRow(sender);
        const textDiv = document.createElement('div');
        textDiv.classList.add('message-text');
        textDiv.textContent = text;
        contentArea.appendChild(textDiv);
        
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });

    // 🎤 Sesli Mesaj Alındığında
    socket.on('audio_message', function(data) {
        const contentArea = createMessageRow(data.sender);
        
        const textDiv = document.createElement('div');
        textDiv.classList.add('message-text');
        
        // Ses oynatıcı (Audio Player) oluşturuyoruz
        const audio = document.createElement('audio');
        audio.src = data.audio;
        audio.controls = true;
        
        textDiv.appendChild(audio);
        contentArea.appendChild(textDiv);
        
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });

    // Metin Mesajı Gönderme
    function sendMessage() {
        const text = messageInput.value.trim();
        if (text !== "") {
            socket.send(nickname + ": " + text);
            messageInput.value = '';
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', function(e) { if (e.key === 'Enter') sendMessage(); });

    // --- SES KAYIT MANTIĞI ---
    voiceBtn.addEventListener('click', async function() {
        if (!isRecording) {
            // Mikrofon izni iste ve kayda başla
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];

                    mediaRecorder.ondataavailable = function(e) {
                        audioChunks.push(e.data);
                    };

                    mediaRecorder.onstop = function() {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/ogg; codecs=opus' });
                        const reader = new FileReader();
                        reader.readAsDataURL(audioBlob); 
                        reader.onloadend = function() {
                            const base64Audio = reader.result;
                            // Ses verisini sunucuya gönder
                            socket.emit('audio_message', {
                                sender: nickname,
                                audio: base64Audio
                            });
                        }
                    };

                    mediaRecorder.start();
                    isRecording = true;
                    voiceBtn.classList.add('recording');
                    voiceBtn.textContent = "🛑";
                } catch (err) {
                    alert("Mikrofon izni reddedildi veya cihaz bulunamadı.");
                }
            } else {
                alert("Tarayıcınız ses kaydetmeyi desteklemiyor.");
            }
        } else {
            // Kaydı durdur
            mediaRecorder.stop();
            // Mikrofonu kapat
            mediaRecorder.stream.getTracks().forEach(track => track.stop());
            isRecording = false;
            voiceBtn.classList.remove('recording');
            voiceBtn.textContent = "🎤";
        }
    });
</script>

</body>
</html>
