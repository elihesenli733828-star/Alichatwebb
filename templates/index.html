<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AliChat - Güvenli Modern</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #eef2f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #chat-container {
            width: 100%;
            max-width: 440px;
            height: 85vh;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        #header {
            background: #ffffff;
            color: #1e293b;
            padding: 18px 20px;
            font-size: 1.2rem;
            font-weight: 600;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header-left { display: flex; align-items: center; gap: 10px; }
        #header .status-dot { width: 9px; height: 9px; background: #10b981; border-radius: 50%; }
        
        /* 🚨 Şikayet Et Butonu */
        #report-mode-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        #report-mode-btn:hover { background: #dc2626; }
        #report-mode-btn.active { background: #1e293b; content: "İptal Et"; }

        #messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background-color: #fafafa;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message-row {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            max-width: 80%;
            transition: all 0.2s;
        }
        .my-row { align-self: flex-end; flex-direction: row-reverse; }
        .other-row { align-self: flex-start; }
        
        /* Şikayet modunda seçilebilir mesajlar */
        .selectable-message { cursor: pointer; }
        .selectable-message:hover { transform: scale(1.02); }
        .selected-for-report .message-text {
            border: 2px solid #ef4444 !important;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.3);
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: 600;
            font-size: 0.85rem;
            background-color: #64748b;
        }
        .message-content { display: flex; flex-direction: column; }
        .my-row .message-content { align-items: flex-end; }
        .sender-name { font-size: 0.75rem; color: #64748b; margin-bottom: 3px; font-weight: 500; padding: 0 4px; }
        .message-text { padding: 10px 14px; font-size: 0.95rem; line-height: 1.4; word-break: break-word; }
        
        .my-row .message-text { background: #0284c7; color: white; border-radius: 16px 16px 4px 16px; }
        .other-row .message-text { background: #f1f5f9; color: #334155; border-radius: 16px 16px 16px 4px; }
        
        #controls-area {
            display: flex;
            flex-direction: column;
            background: #ffffff;
            border-top: 1px solid #f1f5f9;
        }
        #input-area {
            display: flex;
            padding: 15px;
            gap: 10px;
            align-items: center;
        }
        #message-input {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            border-radius: 24px;
            outline: none;
            font-size: 0.95rem;
        }
        #send-btn {
            background: #0284c7; color: white; border: none; padding: 12px 20px; border-radius: 24px; cursor: pointer; font-weight: 600; font-size: 0.95rem;
        }
        
        /* 🚨 Şikayeti Gönder Butonu (Giriş alanının hemen altında yer alacak) */
        #submit-report-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 10px;
            font-weight: bold;
            cursor: pointer;
            display: none; /* Varsayılan olarak gizli */
            text-align: center;
            font-size: 0.9rem;
            border-top: 1px solid #fee2e2;
        }
        #submit-report-btn:hover { background: #dc2626; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="header">
        <div class="header-left">
            <span class="status-dot"></span>
            <span>AliChat</span>
        </div>
        <button id="report-mode-btn">Şikayet Et</button>
    </div>
    
    <div id="messages"></div>
    
    <div id="controls-area">
        <div id="input-area">
            <input type="text" id="message-input" placeholder="Bir mesaj yazın..." autocomplete="off">
            <button id="send-btn">Gönder</button>
        </div>
        <button id="submit-report-btn">🚨 Şikayeti Gönder</button>
    </div>
</div>

<script>
    let nickname = "";
    while (!nickname.trim()) {
        nickname = prompt("AliChat için kullanıcı adı girin:");
    }

    const socket = io();
    
    // IP takibi için sunucuya ismi bildiriyoruz
    socket.emit('register_ip', { nickname: nickname });

    const messagesDiv = document.getElementById('messages');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const reportModeBtn = document.getElementById('report-mode-btn');
    const submitReportBtn = document.getElementById('submit-report-btn');

    let isReportMode = false;
    let selectedMessageText = "";

    // Şikayet modunu açma / kapatma
    reportModeBtn.addEventListener('click', function() {
        isReportMode = !isReportMode;
        if (isReportMode) {
            reportModeBtn.textContent = "İptal Et";
            reportModeBtn.classList.add('active');
            document.querySelectorAll('.message-row').forEach(el => el.classList.add('selectable-message'));
            alert("Şikayet etmek istediğiniz mesaja tıklayın, ardından alttaki 'Şikayeti Gönder' butonuna basın.");
        } else {
            resetReportMode();
        }
    });

    // Reset fonksiyonu
    function resetReportMode() {
        isReportMode = false;
        selectedMessageText = "";
        reportModeBtn.textContent = "Şikayet Et";
        reportModeBtn.classList.remove('active');
        submitReportBtn.style.display = "none";
        document.querySelectorAll('.message-row').forEach(el => {
            el.classList.remove('selectable-message', 'selected-for-report');
        });
    }

    const colors = ['#0f172a', '#2563eb', '#16a34a', '#db2777', '#ea580c', '#7c3aed', '#0891b2'];
    function getAvatarColor(name) {
        let hash = 0;
        for (let i = 0; i < name.length; i++) { hash = name.charCodeAt(i) + ((hash << 5) - hash); }
        return colors[Math.abs(hash) % colors.length];
    }

    socket.on('message', function(data) {
        const separatorIndex = data.indexOf(':');
        let sender = "Sistem";
        let text = data;

        if (separatorIndex !== -1) {
            sender = data.substring(0, separatorIndex).trim();
            text = data.substring(separatorIndex + 1).trim();
        }

        const row = document.createElement('div');
        row.classList.add('message-row');
        row.setAttribute('data-full-text', data); // Şikayet için tam metni saklıyoruz

        if (sender === nickname.trim()) { row.classList.add('my-row'); } 
        else { row.classList.add('other-row'); }

        if (isReportMode) { row.classList.add('selectable-message'); }

        // Mesaj seçme olayı
        row.addEventListener('click', function() {
            if (!isReportMode) return;
            document.querySelectorAll('.message-row').forEach(el => el.classList.remove('selected-for-report'));
            row.classList.add('selected-for-report');
            selectedMessageText = row.getAttribute('data-full-text');
            submitReportBtn.style.display = "block"; // Alttaki butonu göster
        });

        const avatar = document.createElement('div');
        avatar.classList.add('avatar');
        avatar.textContent = sender.charAt(0).toUpperCase();
        avatar.style.backgroundColor = getAvatarColor(sender);

        const content = document.createElement('div');
        content.classList.add('message-content');

        const nameDiv = document.createElement('div');
        nameDiv.classList.add('sender-name');
        nameDiv.textContent = sender;

        const textDiv = document.createElement('div');
        textDiv.classList.add('message-text');
        textDiv.textContent = text;

        content.appendChild(nameDiv);
        content.appendChild(textDiv);
        row.appendChild(avatar);
        row.appendChild(content);
        messagesDiv.appendChild(row);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });

    // Şikayeti Sunucuya Gönder
    submitReportBtn.addEventListener('click', function() {
        if (!selectedMessageText) return;
        socket.emit('submit_report', { text: selectedMessageText });
    });

    // Yapay zeka kontrol sonucu geldiğinde
    socket.on('report_result', function(data) {
        alert(data.message);
        resetReportMode();
        if (data.status === "banned") {
            // Eğer engellenen kişi bizsek sayfayı yenileyip engeli devreye alıyoruz
            location.reload();
        }
    });

    function sendMessage() {
        const text = messageInput.value.trim();
        if (text !== "") {
            socket.send(nickname + ": " + text);
            messageInput.value = '';
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', function(e) { if (e.key === 'Enter') sendMessage(); });
</script>

</body>
</html>
