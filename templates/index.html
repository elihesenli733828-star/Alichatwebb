<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AliChat - Sohbet Ekranı</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #eef2f7;
            padding: 20px 0;
        }
        #chat-container {
            width: 95%;
            max-width: 440px;
            height: 85vh;
            min-height: 500px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
            margin: 0 auto;
            display: block;
            position: relative;
            overflow: hidden;
        }
        #header {
            background: #ffffff;
            color: #1e293b;
            padding: 15px 20px;
            font-size: 1.1rem;
            font-weight: 600;
            border-bottom: 1px solid #f1f5f9;
            height: 60px;
        }
        .header-left { float: left; display: flex; align-items: center; gap: 8px; line-height: 30px; }
        .header-right { float: right; line-height: 30px; }
        #header .status-dot { display: inline-block; width: 9px; height: 9px; background: #10b981; border-radius: 50%; }
        .logout-btn { color: #ef4444; text-decoration: none; font-size: 0.9rem; font-weight: bold; }

        #messages { 
            position: absolute;
            top: 60px;
            bottom: 70px;
            width: 100%;
            padding: 20px;
            overflow-y: auto;
            background-color: #fafafa;
        }
        
        .message-clear { clear: both; margin-bottom: 12px; }
        .message-row { max-width: 80%; cursor: pointer; margin-bottom: 5px; }
        .my-row { float: right; }
        .other-row { float: left; }
        
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            color: white;
            font-weight: 600;
            font-size: 0.85rem;
            text-align: center;
            line-height: 32px;
            margin-bottom: 3px;
        }
        .my-row .avatar { float: right; margin-left: 8px; }
        .other-row .avatar { float: left; margin-right: 8px; }
        
        .message-content { display: block; }
        .sender-name { font-size: 0.75rem; color: #64748b; margin-bottom: 3px; font-weight: 500; }
        .my-row .sender-name { text-align: right; }
        .other-row .sender-name { text-align: left; }
        
        .message-text { padding: 10px 14px; font-size: 0.95rem; line-height: 1.4; word-break: break-word; display: inline-block; }
        .my-row .message-text { background: #0284c7; color: white; border-radius: 16px 16px 4px 16px; float: right; }
        .other-row .message-text { background: #f1f5f9; color: #334155; border-radius: 16px 16px 16px 4px; float: left; }
        
        .reply-container {
            font-size: 0.8rem; background: rgba(0, 0, 0, 0.06); padding: 6px 10px; border-left: 3px solid #0284c7; border-radius: 4px; margin-bottom: 5px; color: #475569; display: block; clear: both;
        }
        .my-row .reply-container { border-left-color: #fff; color: #e0f2fe; background: rgba(255, 255, 255, 0.15); }

        audio { max-width: 100%; margin-top: 4px; display: block; }
        .chat-image { max-width: 100%; max-height: 200px; border-radius: 12px; margin-top: 4px; display: block; }

        #reply-preview-bar { position: absolute; bottom: 70px; left: 0; width: 100%; background: #f1f5f9; padding: 8px 16px; border-top: 1px solid #e2e8f0; display: none; justify-content: space-between; align-items: center; font-size: 0.85rem; color: #475569; z-index: 10; }
        #cancel-reply-btn { background: none; border: none; color: #ef4444; font-weight: bold; cursor: pointer; font-size: 1rem; }

        #input-area { 
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: #ffffff;
            padding: 15px;
            border-top: 1px solid #e2e8f0;
        }
        .input-wrapper { display: flex; gap: 6px; align-items: center; }
        #message-input { flex: 1; padding: 10px 15px; border: 1px solid #e2e8f0; background: #f8fafc; border-radius: 24px; outline: none; font-size: 0.95rem; }
        #send-btn { background: #0284c7; color: white; border: none; padding: 10px 16px; border-radius: 24px; cursor: pointer; font-weight: 600; font-size: 0.95rem; }
        
        #voice-btn, .file-label {
            background: #e2e8f0; color: #334155; border: none; padding: 10px 12px; border-radius: 24px; cursor: pointer; font-weight: 600; font-size: 0.95rem; display: flex; align-items: center; justify-content: center;
        }
        #voice-btn.recording { background: #ef4444; color: white; }
        #image-input { display: none; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="header">
        <div class="header-left">
            <span class="status-dot"></span>
            <span>AliChat ({{ username }})</span>
        </div>
        <div class="header-right">
            {% if is_admin %}
                <a href="/admin" style="color: #0284c7; text-decoration: none; font-size: 0.9rem; font-weight: bold; margin-right: 15px;">Yönetim 🛠️</a>
            {% endif %}
            <a href="/logout" class="logout-btn">Çıkış 🚪</a>
        </div>
    </div>
    
    <div id="messages"></div>
    
    <div id="reply-preview-bar">
        <span id="reply-preview-text">Yanıtlanıyor...</span>
        <button id="cancel-reply-btn">✕</button>
    </div>

    <div id="input-area">
        <div class="input-wrapper">
            <label for="image-input" class="file-label">🖼️</label>
            <input type="file" id="image-input" accept="image/*">
            
            <button id="voice-btn">🎤</button>
            <input type="text" id="message-input" placeholder="Bir mesaj yazın..." autocomplete="off">
            <button id="send-btn">Gönder</button>
        </div>
    </div>
</div>

<script>
    const nickname = "{{ username }}";
    const socket = io();
    const messagesDiv = document.getElementById('messages');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const voiceBtn = document.getElementById('voice-btn');
    const imageInput = document.getElementById('image-input');
    const replyPreviewBar = document.getElementById('reply-preview-bar');
    const replyPreviewText = document.getElementById('reply-preview-text');
    const cancelReplyBtn = document.getElementById('cancel-reply-btn');

    let mediaRecorder, audioChunks = [], isRecording = false;
    let selectedReplyText = "", selectedReplySender = "";

    const colors = ['#0f172a', '#2563eb', '#16a34a', '#db2777', '#ea580c', '#7c3aed', '#0891b2'];
    function getAvatarColor(name) {
        let hash = 0;
        for (let i = 0; i < name.length; i++) { hash = name.charCodeAt(i) + ((hash << 5) - hash); }
        return colors[Math.abs(hash) % colors.length];
    }

    function createMessageRow(sender, replyData) {
        const clearDiv = document.createElement('div');
        clearDiv.classList.add('message-clear');

        const row = document.createElement('div');
        row.classList.add('message-row');
        if (sender === nickname.trim()) { row.classList.add('my-row'); } else { row.classList.add('other-row'); }

        const avatar = document.createElement('div');
        avatar.classList.add('avatar');
        avatar.textContent = sender.charAt(0).toUpperCase();
        avatar.style.backgroundColor = getAvatarColor(sender);

        const content = document.createElement('div');
        content.classList.add('message-content');

        const nameDiv = document.createElement('div');
        nameDiv.classList.add('sender-name');
        nameDiv.textContent = sender;

        content.appendChild(nameDiv);
        row.appendChild(avatar);
        row.appendChild(content);

        if (replyData && replyData.text) {
            const replyBox = document.createElement('div');
            replyBox.classList.add('reply-container');
            replyBox.textContent = `↩️ ${replyData.sender}: ${replyData.text}`;
            content.appendChild(replyBox);
        }

        clearDiv.appendChild(row);
        messagesDiv.appendChild(clearDiv);
        return { contentArea: content, rowElement: row };
    }

    function setupReplyEvent(rowElement, sender, shortText) {
        rowElement.addEventListener('click', function() {
            selectedReplySender = sender; selectedReplyText = shortText;
            replyPreviewText.textContent = `↩️ ${sender}: "${shortText}"`;
            replyPreviewBar.style.display = "flex"; 
            document.getElementById('messages').style.bottom = "105px";
            messageInput.focus();
        });
    }

    cancelReplyBtn.addEventListener('click', function() {
        selectedReplySender = ""; selectedReplyText = ""; 
        replyPreviewBar.style.display = "none";
        document.getElementById('messages').style.bottom = "70px";
    });

    socket.on('message', function(data) {
        let sender = "Sistem", text = data, reply = null;
        if (typeof data === 'object') { sender = data.sender; text = data.text; reply = data.reply; }
        const build = createMessageRow(sender, reply);
        const textDiv = document.createElement('div');
        textDiv.classList.add('message-text'); textDiv.textContent = text;
        build.contentArea.appendChild(textDiv);
        setupReplyEvent(build.rowElement, sender, text.length > 25 ? text.substring(0, 25) + "..." : text);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });

    socket.on('audio_message', function(data) {
        const build = createMessageRow(data.sender, data.reply);
        const textDiv = document.createElement('div'); textDiv.classList.add('message-text');
        const audio = document.createElement('audio'); audio.src = data.audio; audio.controls = true;
        textDiv.appendChild(audio); build.contentArea.appendChild(textDiv);
        setupReplyEvent(build.rowElement, data.sender, "🎵 Ses Kaydı");
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });

    socket.on('image_message', function(data) {
        const build = createMessageRow(data.sender, data.reply);
        const textDiv = document.createElement('div'); textDiv.classList.add('message-text');
        const img = document.createElement('img'); img.src = data.image; img.classList.add('chat-image');
        textDiv.appendChild(img); build.contentArea.appendChild(textDiv);
        setupReplyEvent(build.rowElement, data.sender, "🖼️ Fotoğraf");
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });

    function sendMessage() {
        const text = messageInput.value.trim();
        if (text !== "") {
            socket.emit('message', {
                sender: nickname, text: text,
                reply: selectedReplyText ? { sender: selectedReplySender, text: selectedReplyText } : null
            });
            messageInput.value = ''; cancelReplyBtn.click();
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', function(e) { if (e.key === 'Enter') sendMessage(); });

    imageInput.addEventListener('change', function() {
        const file = this.files[0];
        if (file) {
            const reader = new FileReader(); reader.readAsDataURL(file);
            reader.onloadend = function() {
                socket.emit('image_message', {
                    sender: nickname, image: reader.result,
                    reply: selectedReplyText ? { sender: selectedReplySender, text: selectedReplyText } : null
                });
                cancelReplyBtn.click();
            }
            this.value = "";
        }
    });

    voiceBtn.addEventListener('click', async function() {
        if (!isRecording) {
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream); audioChunks = [];
                    mediaRecorder.ondataavailable = function(e) { audioChunks.push(e.data); };
                    mediaRecorder.onstop = function() {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/ogg; codecs=opus' });
                        const reader = new FileReader(); reader.readAsDataURL(audioBlob); 
                        reader.onloadend = function() {
                            socket.emit('audio_message', {
                                sender: nickname, audio: reader.result,
                                reply: selectedReplyText ? { sender: selectedReplySender, text: selectedReplyText } : null
                            });
                            cancelReplyBtn.click();
                        }
                    };
                    mediaRecorder.start(); isRecording = true; voiceBtn.classList.add('recording'); voiceBtn.textContent = "🛑";
                } catch (err) { alert("Mikrofon izni reddedildi."); }
            } else { alert("Tarayıcı desteklemiyor."); }
        } else {
            mediaRecorder.stop(); mediaRecorder.stream.getTracks().forEach(track => track.stop());
            isRecording = false; voiceBtn.classList.remove('recording'); voiceBtn.textContent = "🎤";
        }
    });
</script>
</body>
</html>
